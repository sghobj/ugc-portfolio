query Ugc {
    ugc: ugcSecure {
        aboutMe {
            sectionName
            text
            title
        }
        hero {
            name
            text
            title
        }
        myServices {
            sectionName
            title
            service {
                iconName
                serviceDetails
                id
            }
        }
        myWork: myPhotographyWork {
            sectionName
            text
            title
            media {
                id
                kind
                title
                description
                hook
                goal
                style
                sortOrder
                categories {
                    name
                }
                media {
                    url
                    alternativeText
                    width
                    height
                    mime
                    provider
                    embedUrl
                    playbackUrl
                    thumbnailUrl
                    focalPointX
                    focalPointY
                }
            }
        }
        collections {
            id
            name
            description
            story
            isCollaboration
            insights {
                name
            }
            media {
                id
                kind
                title
                description
                hook
                goal
                style
                sortOrder
                isCollaboration
                categories {
                    name
                }
                media {
                    url
                    alternativeText
                    width
                    height
                    mime
                    provider
                    embedUrl
                    playbackUrl
                    thumbnailUrl
                    focalPointX
                    focalPointY
                }
            }
        }
        highlights {
            id
            kind
            title
            description
            hook
            goal
            style
            sortOrder
            isCollaboration
            categories {
                name
            }
            media {
                url
                alternativeText
                width
                height
                mime
                provider
                embedUrl
                playbackUrl
                thumbnailUrl
                focalPointX
                focalPointY
            }
        }
        videos {
            id
            kind
            title
            description
            hook
            goal
            style
            sortOrder
            isCollaboration
            categories {
                name
            }
            media {
                url
                alternativeText
                width
                height
                mime
                provider
                embedUrl
                playbackUrl
                thumbnailUrl
                focalPointX
                focalPointY
            }
        }
    }
}
