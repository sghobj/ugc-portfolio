query Ugc {
    ugc: ugcSecure {
        aboutMe {
            sectionName
            text
            title
        }
        hero {
            name
            text
            title
        }
        myServices {
            sectionName
            title
            service {
                iconName
                serviceDetails
                id
            }
        }
        myWork: myPhotographyWork {
            sectionName
            text
            title
            media {
                id
                kind
                title
                description
                hook
                goal
                style
                instagramUrl
                sortOrder
                metricViews
                metricLikes
                metricShares
                metricSaves
                categories {
                    name
                }
                media {
                    url
                    alternativeText
                    width
                    height
                    mime
                    provider
                    embedUrl
                    playbackUrl
                    thumbnailUrl
                    focalPointX
                    focalPointY
                }
            }
        }
        brands {
            id
            name
            logo
            website
            location
            category
            relatedCollectionSlug
            relatedCollectionName
        }
        collections {
            id
            name
            description
            story
            isCollaboration
            client
            clientLogo
            location
            deliverables
            testimonial {
                name
                role
                quote
            }
            insights {
                name
            }
            media {
                id
                kind
                title
                description
                hook
                goal
                style
                instagramUrl
                sortOrder
                isCollaboration
                metricViews
                metricLikes
                metricShares
                metricSaves
                categories {
                    name
                }
                media {
                    url
                    alternativeText
                    width
                    height
                    mime
                    provider
                    embedUrl
                    playbackUrl
                    thumbnailUrl
                    focalPointX
                    focalPointY
                }
            }
        }
        highlights {
            id
            kind
            title
            description
            hook
            goal
            style
            instagramUrl
            sortOrder
            isCollaboration
            metricViews
            metricLikes
            metricShares
            metricSaves
            categories {
                name
            }
            media {
                url
                alternativeText
                width
                height
                mime
                provider
                embedUrl
                playbackUrl
                thumbnailUrl
                focalPointX
                focalPointY
            }
        }
        videos {
            id
            kind
            title
            description
            hook
            goal
            style
            instagramUrl
            sortOrder
            isCollaboration
            metricViews
            metricLikes
            metricShares
            metricSaves
            categories {
                name
            }
            media {
                url
                alternativeText
                width
                height
                mime
                provider
                embedUrl
                playbackUrl
                thumbnailUrl
                focalPointX
                focalPointY
            }
        }
        showMetrics
        performance {
            periodLabel
            views
            reached
            nonFollowerPct
            interactions
            followers
            note
        }
    }
}
