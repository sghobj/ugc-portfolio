query Ugc {
    ugc: ugcSecure {
        aboutMe {
            sectionName
            text
            title
        }
        hero {
            name
            text
            title
        }
        myServices {
            sectionName
            title
            service {
                iconName
                serviceDetails
                id
            }
        }
        myWork: myPhotographyWork {
            sectionName
            text
            title
            media {
                id
                kind
                title
                description
                hook
                goal
                style
                categories {
                    name
                }
                media {
                    url
                    alternativeText
                    width
                    height
                    mime
                }
            }
        }
    }
}
